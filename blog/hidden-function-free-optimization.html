  <script>
    (function () {
      var article = document.getElementById('post');
      var backLink = '<p class="post-back"><a href="../research.html">&larr; back to research</a></p>';

      fetch('blog-function-free-optimization.md')
        .then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.text();
        })
        .then(function (md) {
          // Protect LaTeX math from the Markdown parser, then restore it
          // afterwards so MathJax sees the original TeX untouched.
          var math = [];
          md = md.replace(/\$\$[\s\S]+?\$\$/g, function (m) {
            math.push(m); return '@@MATH' + (math.length - 1) + '@@';
          });
          md = md.replace(/\$[^$\n]+?\$/g, function (m) {
            math.push(m); return '@@MATH' + (math.length - 1) + '@@';
          });

          var html = marked.parse(md);
          html = html.replace(/@@MATH(\d+)@@/g, function (_, i) { return math[+i]; });

          article.innerHTML = backLink + html;

          // Typeset math once MathJax has finished loading.
          (function typeset() {
            if (window.MathJax && MathJax.typesetPromise) {
              MathJax.startup.promise.then(function () { MathJax.typesetPromise([article]); });
            } else {
              setTimeout(typeset, 200);
            }
          })();
        })
        .catch(function (err) {
          article.innerHTML = backLink +
            '<p>Sorry, the post could not be loaded (' + err.message + '). ' +
            'You can read the <a href="blog-function-free-optimization.md">raw Markdown</a> instead.</p>';
        });
    })();
