      font-weight: 600;
      color: var(--theme-color);
      margin: 2.4rem 0 1rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid var(--border-color);
    }
    .post h3 {
      font-family: var(--serif);

    .post .post-date {

      font-size: 0.88rem;

      line-height: 1.5;
      max-width: 600px;
      margin: 0 auto;
    }
    .post blockquote {
      margin: 1.4rem 0;
      padding: 0.3rem 1.1rem;
      border-left: 3px solid var(--theme-color);
      background: rgba(31, 78, 121, 0.04);
      color: var(--text-color);
    }
    .post blockquote p { margin: 0.5rem 0; }
    .post code {
      font-size: 0.9em;
      background: rgba(31, 78, 121, 0.07);
      padding: 0.1em 0.35em;

  <script src="../../assets/js/nav.js"></script>
  <script>
    (function () {
      var article = document.getElementById('post');
      var backLink = '<p class="post-back"><a href="../../blogs.html">&larr; back to blogs</a></p>';
      var postDate = 'June 11, 2026';   // exact post date; also shown on blogs.html

      fetch('blog-post.md')
        .then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.text();
        })
        .then(function (md) {
          article.innerHTML = backLink + marked.parse(md);
          var h1 = article.querySelector('h1');
          if (h1 && postDate) {
            var d = document.createElement('p');
            d.className = 'post-date';
            d.textContent = postDate;
            h1.insertAdjacentElement('afterend', d);
          }
        })
        .catch(function (err) {
          article.innerHTML = backLink +
            '<p>Sorry, the post could not be loaded (' + err.message + '). ' +
            'You can read the <a href="blog-post.md">raw Markdown</a> instead.</p>';
        });
    })();
  </script>
</body>
